<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Admin - Product Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
      
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        color: #e2e8f0;
      }

      /* Glassmorphism Effect */
      .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Input Styling */
      input, textarea {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important;
      }

      input:focus, textarea:focus {
        border-color: #6366f1 !important;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2) !important;
        outline: none !important;
      }

      /* Custom File Input Utility */
      .file-input-wrapper input[type="file"] {
        position: absolute;
        left: -9999px;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="min-h-screen py-10 px-4 custom-scrollbar">
    
    <div class="max-w-7xl mx-auto">
      <header class="glass-panel rounded-[2rem] p-8 mb-10 shadow-2xl flex flex-col md:flex-row items-center justify-between gap-6">
        <div class="flex items-center space-x-6">
          <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-fuchsia-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
            <i class="fas fa-terminal text-white text-2xl"></i>
          </div>
          <div>
            <h1 class="text-4xl font-extrabold text-white tracking-tight">Admin <span class="text-indigo-400">Panel</span></h1>
            <p class="text-slate-400 font-medium">Configure and deploy new inventory assets</p>
          </div>
        </div>
        <a href="#container" class="group px-8 py-3 bg-white/5 hover:bg-white/10 text-white font-semibold rounded-2xl border border-white/10 transition-all flex items-center space-x-3">
          <i class="fas fa-cubes text-indigo-400 group-hover:rotate-12 transition-transform"></i>
          <span>Database View</span>
        </a>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
        
        <div class="lg:col-span-7 glass-panel rounded-[2.5rem] p-10 shadow-inner">
          <div class="mb-10">
            <h2 class="text-2xl font-bold text-white flex items-center space-x-3">
              <span class="w-2 h-8 bg-indigo-500 rounded-full"></span>
              <span>Primary Configuration</span>
            </h2>
          </div>

          <form id="itemForm" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div class="space-y-3">
                <label for="name" class="text-sm font-semibold text-slate-300 flex items-center gap-2">
                  <i class="fas fa-fingerprint text-indigo-400"></i> Asset Name
                </label>
                <input type="text" id="name" required placeholder="Masterpiece Pro..." class="w-full px-5 py-4 rounded-2xl transition-all" />
              </div>

              <div class="space-y-3">
                <label for="price" class="text-sm font-semibold text-slate-300 flex items-center gap-2">
                  <i class="fas fa-coins text-yellow-500"></i> Credits (USD)
                </label>
                <input required type="number" step="0.01" min="0" id="price" placeholder="0.00" class="w-full px-5 py-4 rounded-2xl transition-all" />
              </div>
            </div>

            <div class="space-y-3">
              <label class="text-sm font-semibold text-slate-300 flex items-center gap-2">
                <i class="fas fa-camera-retro text-fuchsia-400"></i> Visual Identity
              </label>
              <div class="file-input-wrapper group">
                <input type="file" id="image" accept="image/*" required />
                <button type="button" id="fileBtn" class="w-full py-4 bg-indigo-600/20 hover:bg-indigo-600/40 border border-indigo-500/30 text-indigo-200 font-bold rounded-2xl transition-all flex items-center justify-center space-x-3">
                  <i class="fas fa-upload animate-bounce"></i>
                  <span>Select Image Asset</span>
                </button>
              </div>
              
              <div id="imagePreview" class="mt-6 p-2 glass-panel rounded-3xl border-2 border-dashed border-white/10 min-h-[180px] flex items-center justify-center overflow-hidden">
                <div class="text-center text-slate-500">
                  <i class="fas fa-photo-film text-4xl mb-3 opacity-20"></i>
                  <p class="text-sm">VGA Signal Missing: Upload Image</p>
                </div>
              </div>
            </div>

            <div class="space-y-3">
              <label for="description" class="text-sm font-semibold text-slate-300 flex items-center gap-2">
                <i class="fas fa-pen-nib text-emerald-400"></i> Technical specs / Description
              </label>
              <textarea id="description" rows="4" placeholder="Detail the unique features of this asset..." class="w-full px-5 py-4 rounded-2xl transition-all resize-none"></textarea>
            </div>

            <button id="create" type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-fuchsia-600 hover:from-indigo-500 hover:to-fuchsia-500 text-white font-black py-5 rounded-2xl text-xl shadow-xl shadow-indigo-500/20 transform hover:-translate-y-1 transition-all flex items-center justify-center space-x-4">
              <i class="fas fa-bolt"></i>
              <span>INITIALIZE DEPLOYMENT</span>
            </button>
          </form>
        </div>

        <div class="lg:col-span-5">
          <div class="sticky top-10 glass-panel rounded-[2.5rem] p-8 border-indigo-500/20">
            <h3 class="text-xl font-bold text-white mb-8 flex items-center justify-between">
              <span>Live Monitor</span>
              <span class="flex h-3 w-3 rounded-full bg-emerald-500 animate-pulse"></span>
            </h3>
            
            <div id="previewCard" class="relative group bg-slate-900/50 border border-white/10 rounded-3xl p-6 min-h-[450px] flex flex-col items-center justify-center transition-all duration-500">
              <div class="text-center space-y-4">
                <div class="w-20 h-20 mx-auto bg-white/5 rounded-full flex items-center justify-center border border-white/10">
                  <i class="fas fa-cube text-4xl text-slate-700"></i>
                </div>
                <h4 class="text-2xl font-bold text-slate-600 italic uppercase tracking-widest">Ghost Asset</h4>
                <p class="text-slate-500 max-w-[200px]">Data stream pending. Complete configuration to see visual.</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="container" class="mt-24 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
        </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
