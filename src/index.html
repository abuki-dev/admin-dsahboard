<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Add Shopping Item</title>
    <link rel="stylesheet" href="output.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      .file-input-wrapper {
        position: relative;
        overflow: hidden;
        display: inline-block;
        width: 100%;
      }
      .file-input-wrapper input[type="file"] {
        position: absolute;
        left: -9999px;
      }
      .image-preview {
         max-width: 100%;
        max-height: 200px;
        object-fit: cover;
        border-radius: 8px;
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-indigo-50 to-purple-50 min-h-screen py-8">
    <!-- Header -->
    <div class="max-w-6xl mx-auto px-4">
      <div
        class="bg-white/80 backdrop-blur-md rounded-2xl shadow-xl border border-white/50 p-8 mb-8"
      >
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center space-x-4">
            <div
              class="w-12 h-12 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center"
            >
              <i class="fas fa-store text-white text-xl"></i>
            </div>
            <div>
              <h1
                class="text-3xl font-bold bg-gradient-to-r from-gray-900 to-gray-700 bg-clip-text text-transparent"
              >
                Admin Dashboard
              </h1>
              <p class="text-gray-600">Add new product to your store</p>
            </div>
          </div>
          <button
            class="px-6 py-2 bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium rounded-xl transition-all duration-200 flex items-center space-x-2"
          >
            <i class="fas fa-list"></i>
            <a
              href="#container"
              class="text-gray-800 hover:text-gray-900 transition-colors duration-200"
            >
              <span>View Products</span>
            </a>
          </button>
        </div>

        <!-- Form Card -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <!-- Form -->
          <div
            class="bg-white rounded-3xl shadow-2xl p-8 border border-gray-100"
          >
            <h2
              class="text-2xl font-bold text-gray-800 mb-2 flex items-center space-x-3"
            >
              <i class="fas fa-plus-circle text-indigo-500"></i>
              <span>Add New Item</span>
            </h2>
            <p class="text-gray-600 mb-8">
              Fill out the details to create your new product
            </p>

            <form id="itemForm" class="space-y-6">
              <!-- Item Name -->
              <div class="space-y-2">
                <label
                  for="name"
                  class="block text-sm font-semibold text-gray-700 flex items-center space-x-2"
                >
                  <i class="fas fa-tag text-indigo-500"></i>
                  <span>Product Name</span>
                </label>
                <input
                  type="text"
                  id="name"
                  required
                  placeholder="e.g. Nike Air Max, Chanel Perfume"
                  class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all duration-200 bg-gray-50/50 hover:bg-gray-50 text-lg"
                />
              </div>

              <!-- Price -->
              <div class="space-y-2">
                <label
                  for="price"
                  class="block text-sm font-semibold text-gray-700 flex items-center space-x-2"
                >
                  <i class="fas fa-dollar-sign text-green-500"></i>
                  <span>Price ($)</span>
                </label>
                <input
                  required
                  type="number"
                  step="0.01"
                  min="0"
                  id="price"
                  placeholder="99.99"
                  class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all duration-200 bg-gray-50/50 hover:bg-gray-50 text-lg"
                />
              </div>

              <!-- Image -->
              <div class="space-y-2">
                <label
                  for="image"
                  class="block text-sm font-semibold text-gray-700 flex items-center space-x-2"
                >
                  <i class="fas fa-image text-blue-500"></i>
                  <span>Product Image</span>
                </label>
                <div class="file-input-wrapper">
                  <input
                    type="file"
                    id="image"
                    accept="image/*"
                    required
                    class="file-input-wrapper"
                  />
                  <button
                    type="button"
                    id="fileBtn"
                    class="w-full px-4 py-3 bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-medium rounded-2xl hover:from-blue-600 hover:to-indigo-700 transition-all duration-200 flex items-center justify-center space-x-3 shadow-lg hover:shadow-xl"
                  >
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Choose Image</span>
                  </button>
                </div>
                <div
                  id="imagePreview"
                  class="mt-4 p-4 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 min-h-[200px] flex items-center justify-center text-gray-500"
                >
                  <div class="text-center">
                    <i class="fas fa-image text-4xl mb-2 opacity-50"></i>
                    <p>Image preview will appear here</p>
                  </div>
                </div>
              </div>

              <!-- Description -->
              <div class="space-y-2">
                <label
                  for="description"
                  class="block text-sm font-semibold text-gray-700 flex items-center space-x-2"
                >
                  <i class="fas fa-align-left text-purple-500"></i>
                  <span>Description</span>
                </label>
                <textarea
                  id="description"
                  rows="4"
                  placeholder="Write detailed product description..."
                  class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all duration-200 resize-vertical bg-gray-50/50 hover:bg-gray-50 text-lg"
                ></textarea>
              </div>

              <!-- Submit Button -->
              <button
                id="create"
                type="submit"
                class="w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white font-bold py-4 px-8 rounded-2xl text-lg shadow-2xl hover:shadow-3xl transform hover:-translate-y-1 transition-all duration-300 flex items-center justify-center space-x-3"
              >
                <i class="fas fa-rocket"></i>
                <span>Create Product</span>
              </button>
            </form>
          </div>

          <!-- Preview Card -->
          <div
            class="bg-white rounded-3xl shadow-2xl p-8 border border-gray-100"
          >
            <h3
              class="text-xl font-bold text-gray-800 mb-6 flex items-center space-x-3"
            >
              <i class="fas fa-eye text-green-500"></i>
              <span>Product Preview</span>
            </h3>
            <div
              id="previewCard"
              class="bg-gradient-to-b from-white to-gray-50 rounded-2xl p-6 shadow-lg border border-gray-100 min-h-[400px] flex flex-col items-center justify-center text-center space-y-4 opacity-50"
            >
              <i class="fas fa-box-open text-6xl text-gray-300"></i>
              <h4 class="text-2xl font-bold text-gray-400">Product preview</h4>
              <p class="text-gray-500">Fill out the form to see live preview</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Products Container -->
      <div
        id="container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
      ></div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
